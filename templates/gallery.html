<!DOCTYPE html><html>
<head><title>Hair Style Gallery</title>

<style>

    body{
        font-family:Arial;
        background:#f2f2f2;
        margin:0;
    }

    h1{
        text-align:center;
        padding:20px;
    }

    .gallery{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }

    .card{
        background:white;
        width:300px;
        margin:15px;
        padding:15px;
        border-radius:10px;
        box-shadow:0px 0px 10px lightgray;
        text-align:center;
    }

    img{
        width:100%;
        border-radius:10px;
    }

    .delete-btn{
        display:inline-block;
        margin-top:10px;
        background:red;
        color:white;
        padding:8px 12px;
        text-decoration:none;
        border-radius:5px;
    }

</style>

</head><body><h1>💈 Hair Style Gallery</h1><div class="gallery">{% for image in images %}

<div class="card"><img src="{{ url_for('static', filename='uploads/' + image) }}">

{% for style in styles %}

<div class="card">

    <img src="{{ url_for('static',
    filename='uploads/' + style[1]) }}">

    <h2>{{ style[2] }}</h2>

    <h3>{{ style[3] }}</h3>

    <p>{{ style[4] }}</p>

    <a href="/book-style/{{ style[0] }}">
        Book This Style
    </a>

</div>

{% endfor %}

{% if session.get("logged_in") %}
    <br>
    <a class="delete-btn"
       href="/delete-image/{{ image }}">
       Delete
    </a>
{% endif %}

</div>{% endfor %}

</div></body>
</html>

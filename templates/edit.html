<!DOCTYPE html>
<html>
<head>
    <title>Edit Booking</title>
</head>
<body>

<h1>Edit Booking</h1>

<form method="POST" action="/update/{{ booking[0] }}">

    <input type="text"
           name="name"
           value="{{ booking[1] }}"
           required>

    <br><br>

    <input type="text"
           name="phone"
           value="{{ booking[2] }}"
           required>

    <br><br>

    <input type="text"
           name="service"
           value="{{ booking[3] }}"
           required>

    <br><br>

    <button type="submit">
        Update Booking
    </button>

</form>

</body>
</html>

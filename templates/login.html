<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
        }

        .navbar {
            background: black;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .login-box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px lightgray;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: green;
        }

        .logo {
            text-align: center;
            font-size: 40px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="/">Home</a>
        <a href="/gallery">Styles</a>
        <a href="/status">Check Status</a>
    </div>

    <div class="login-box">

        <div class="logo">💈</div>

        <h1>Admin Login</h1>

        <form method="POST" action="/login">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <br><br>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <br><br>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
